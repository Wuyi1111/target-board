<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#f7f6f3">
<title>靶式待办</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="靶式待办">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- MOBILE HEADER (hidden on desktop) -->
  <header class="mobile-header">
    <h1>靶式待办</h1>
  </header>

  <!-- ICON RAIL — + is in the middle and visually emphasized -->
  <nav class="rail" id="rail" aria-label="主导航">
    <button class="rail-btn" type="button" data-section="filter" title="筛选" aria-label="筛选">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    </button>
    <button class="rail-btn" type="button" data-section="users" title="用户" aria-label="用户管理">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9.5" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </button>
    <button class="rail-btn rail-btn-primary" type="button" data-section="add" title="添加任务 (Ctrl/⌘+K)" aria-label="添加任务">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="rail-btn" type="button" data-section="stats" title="圈层统计" aria-label="统计">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="rail-btn" type="button" data-section="settings" title="设置" aria-label="设置">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6 1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9 1.65 1.65 0 0 0 20.91 10H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </nav>

  <!-- CANVAS -->
  <main class="canvas-wrap" id="canvas-wrap">
    <div class="canvas-area" id="canvas-area"></div>
    <div class="trash-zone" id="trash-zone" aria-hidden="true" title="拖到这里删除">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    </div>
  </main>

  <!-- FLOATING PANEL -->
  <aside class="float-panel" id="float-panel" aria-hidden="true">
    <header class="float-panel-header">
      <span class="float-panel-title" id="float-panel-title">添加任务</span>
      <button class="panel-close-btn" type="button" data-action="close-panel" aria-label="关闭">×</button>
    </header>

    <div class="float-panel-body">

      <!-- ADD -->
      <section class="ps" data-content="add">
        <div class="form-row">
          <label for="f-zone">优先级</label>
          <select id="f-zone">
            <option value="urgent">🔴 紧急</option>
            <option value="todo">🟠 需要做</option>
            <option value="should" selected>⚪ 应做</option>
          </select>
        </div>
        <div class="form-row">
          <label for="f-title">任务标题 *</label>
          <input id="f-title" type="text" placeholder="任务名称...">
        </div>
        <div class="form-row">
          <label for="f-desc">描述（可选）</label>
          <textarea id="f-desc" placeholder="补充说明..."></textarea>
        </div>
        <div class="form-row">
          <label for="f-ddl">截止时间 DDL</label>
          <input id="f-ddl" type="date">
        </div>
        <div class="form-row">
          <label for="f-user">所属用户</label>
          <select id="f-user"></select>
        </div>
        <div class="form-row">
          <label>卡片颜色</label>
          <div class="color-row" id="color-swatches">
            <div class="color-swatch active" style="background:#fff;border:1px solid var(--border)" data-color="#ffffff"></div>
            <div class="color-swatch" style="background:#dbeafe" data-color="#dbeafe"></div>
            <div class="color-swatch" style="background:#dcfce7" data-color="#dcfce7"></div>
            <div class="color-swatch" style="background:#fef3c7" data-color="#fef3c7"></div>
            <div class="color-swatch" style="background:#fce7f3" data-color="#fce7f3"></div>
            <div class="color-swatch" style="background:#ede9fe" data-color="#ede9fe"></div>
            <input type="color" id="f-color-custom" value="#ffffff" title="自定义颜色">
          </div>
        </div>
        <button class="btn-primary" id="btn-add" type="button">＋ 添加到画布</button>
        <div class="hint">在标题框按 <kbd>Enter</kbd> 直接添加</div>
      </section>

      <!-- FILTER -->
      <section class="ps" data-content="filter">
        <div class="sub-label">按用户</div>
        <div class="filter-row" id="user-filters"></div>
        <div class="sub-label" style="margin-top:14px">按优先级</div>
        <div class="filter-row">
          <div class="filter-chip active" data-zone="all">全部</div>
          <div class="filter-chip" data-zone="urgent">🔴 紧急</div>
          <div class="filter-chip" data-zone="todo">🟠 需要做</div>
          <div class="filter-chip" data-zone="should">🟡 应做</div>
        </div>
      </section>

      <!-- USERS -->
      <section class="ps" data-content="users">
        <div id="user-list"></div>
        <button class="btn-sm" style="margin-top:10px;width:100%" data-action="add-user" type="button">＋ 添加用户</button>
      </section>

      <!-- STATS -->
      <section class="ps" data-content="stats">
        <div class="zone-count" id="zone-counts"></div>
      </section>

      <!-- SETTINGS (includes history) -->
      <section class="ps" data-content="settings">
        <div class="settings-block">
          <div class="settings-label">历史记录</div>
          <div id="history-list" class="history-list"></div>
        </div>
        <div class="settings-block">
          <div class="settings-label">版本</div>
          <div class="settings-value" id="set-version">—</div>
        </div>
        <div class="settings-block">
          <div class="settings-label">本地数据</div>
          <div class="settings-value" id="set-storage">—</div>
        </div>
        <div class="settings-block">
          <div class="settings-label">离线缓存</div>
          <div class="settings-value" id="set-cache">—</div>
        </div>
        <button class="btn-sm" style="width:100%;margin-top:6px" data-action="refresh-cache" type="button">更新到最新版本</button>
        <button class="btn-sm btn-danger" style="width:100%;margin-top:6px" data-action="clear-data" type="button">清空所有本地数据</button>
      </section>

    </div>
  </aside>

</div>

<!-- Edit modal -->
<div class="modal-overlay" id="modal" style="display:none" role="dialog" aria-modal="true">
  <div class="modal">
    <h3>编辑任务</h3>
    <div class="form-row">
      <label for="e-zone">优先级</label>
      <select id="e-zone">
        <option value="urgent">🔴 紧急</option>
        <option value="todo">🟠 需要做</option>
        <option value="should">⚪ 应做</option>
      </select>
    </div>
    <div class="form-row"><label for="e-title">任务标题</label><input id="e-title" type="text"></div>
    <div class="form-row"><label for="e-desc">描述</label><textarea id="e-desc"></textarea></div>
    <div class="form-row"><label for="e-ddl">截止时间 DDL</label><input id="e-ddl" type="date"></div>
    <div class="form-row"><label for="e-user">所属用户</label><select id="e-user"></select></div>
    <div class="form-row"><label for="e-color">卡片颜色</label><input id="e-color" type="color"></div>
    <div class="modal-actions">
      <button class="btn-sm btn-danger" data-action="delete-task" type="button">删除</button>
      <button class="btn-sm" data-action="close-modal" type="button">取消</button>
      <button class="btn-primary" style="width:auto;padding:7px 18px" data-action="save-edit" type="button">保存</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<script src="app.js"></script>
</body>
</html>
